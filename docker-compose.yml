version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - 7100:7100
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 7100

  frontend:
    build: ./frontend
    ports:
      - 3000:3000
    volumes:
      - ./frontend/:/app/
      # Hack to prevent copying the node_modules folder into the project
      - /app/node_modules
    command: yarn dev --host 0.0.0.0
